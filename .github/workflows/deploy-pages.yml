name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare Firebase env
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
        run: |
          required_vars=(
            REACT_APP_FIREBASE_API_KEY
            REACT_APP_FIREBASE_AUTH_DOMAIN
            REACT_APP_FIREBASE_PROJECT_ID
            REACT_APP_FIREBASE_STORAGE_BUCKET
            REACT_APP_FIREBASE_MESSAGING_SENDER_ID
            REACT_APP_FIREBASE_APP_ID
          )

          has_all_secrets=true
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              has_all_secrets=false
              break
            fi
          done

          if [ "$has_all_secrets" = true ]; then
            {
              echo "REACT_APP_FIREBASE_API_KEY=${REACT_APP_FIREBASE_API_KEY}"
              echo "REACT_APP_FIREBASE_AUTH_DOMAIN=${REACT_APP_FIREBASE_AUTH_DOMAIN}"
              echo "REACT_APP_FIREBASE_PROJECT_ID=${REACT_APP_FIREBASE_PROJECT_ID}"
              echo "REACT_APP_FIREBASE_STORAGE_BUCKET=${REACT_APP_FIREBASE_STORAGE_BUCKET}"
              echo "REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}"
              echo "REACT_APP_FIREBASE_APP_ID=${REACT_APP_FIREBASE_APP_ID}"
            } > .env
            echo "Using Firebase config from GitHub secrets."
          else
            if [ ! -f .env.example ]; then
              echo "::error::.env.example is missing and required Firebase secrets were not provided."
              exit 1
            fi
            cp .env.example .env
            echo "Using Firebase config from .env.example fallback."
          fi

          for key in "${required_vars[@]}"; do
            if ! grep -Eq "^${key}=.+$" .env; then
              echo "::error::Missing required Firebase config: ${key}"
              exit 1
            fi
          done

      - name: Build app
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
